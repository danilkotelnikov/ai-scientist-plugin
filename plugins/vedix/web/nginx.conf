server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every unknown path serves index.html so the React
    # router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets: long-cache hashed bundles.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check used by the Dockerfile HEALTHCHECK.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Security headers — sensible defaults; can be relaxed per env.
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;

    # Don't expose nginx version.
    server_tokens off;

    # Gzip for text payloads.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/wasm
               image/svg+xml application/x-font-ttf font/opentype;
}
